<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TURBO DASH</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #04040f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
  }

  #game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  /* 説明画面のレイヤー */
  #ui-layer {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: center;
    background: rgba(0, 0, 0, 0.6); /* 背景を少し透かす */
    z-index: 100;
  }

  #start-screen {
    text-align: center;
    color: #00ffc8;
    border: 2px solid #00ffc8;
    padding: 25px;
    background: #0a0a15;
    box-shadow: 0 0 25px rgba(0, 255, 200, 0.4);
    border-radius: 12px;
  }

  #start-button {
    background: #00ffc8;
    color: #000;
    border: none;
    padding: 12px 25px;
    font-family: 'Orbitron', sans-serif;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    margin-top: 20px;
    border-radius: 4px;
  }

  #gameCanvas {
    display: block;
    border: 1px solid rgba(0,255,200,0.25);
    box-shadow:
      0 0 15px rgba(0,255,200,0.15),
      0 0 50px rgba(0,255,200,0.06),
      inset 0 0 30px rgba(0,0,0,0.5);
    image-rendering: pixelated;
  }

  #btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }

  .btn {
    flex: 1;
    background: rgba(0,255,200,0.07);
    border: 1px solid rgba(0,255,200,0.3);
    color: #00ffc8;
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 700;
    padding: 14px 0;
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    text-align: center;
    transition: background 0.1s;
    letter-spacing: 1px;
  }
  .btn:active, .btn.held {
    background: rgba(0,255,200,0.22);
    box-shadow: 0 0 12px rgba(0,255,200,0.3);
  }
  #btn-start {
    background: rgba(255,60,100,0.1);
    border-color: rgba(255,60,100,0.4);
    color: #ff3c64;
    font-size: 13px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div id="ui-layer">
    <div id="start-screen">
        <h1 style="margin-bottom:15px; font-size: 32px;">TURBO DASH</h1>
        <div style="text-align: left; margin-bottom: 20px; line-height: 1.6;">
            <p style="color: #ffaa00; font-weight: bold; border-bottom: 1px solid #ffaa00; margin-bottom: 8px;">【操作方法】</p>
            <ul style="list-style: none; padding-left: 5px; margin-bottom: 15px;">
                <li>◀ ▶ : 左右へ移動</li>
                <li>SPACE : ターボ加速</li>
            </ul>
            <p style="color: #ffaa00; font-weight: bold; border-bottom: 1px solid #ffaa00; margin-bottom: 8px;">【ミッション】</p>
            <p>敵車を避けてスコアを稼げ！<br>
               赤いボタンで一時停止が可能。</p>
        </div>
        <button id="start-button">START ENGINE</button>
    </div>
</div>

<div id="game-wrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="btn-row">
    <button class="btn" id="btn-left">◀</button>
    <button class="btn" id="btn-start">START / STOP</button>
    <button class="btn" id="btn-right">▶</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  GAME CONFIG & STATE
// ─────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const LW = 400; 
const LH = 600; 

let STATE     = 'START'; 
let isPaused  = false;
let score     = 0;
let bestScore = 0;
let lives     = 5;
let gameSpeed = 4;
let frame     = 0;
let roadOff   = 0;
let spawnTimer = 0;
let spawnInt   = 180;
let combo      = 0;
let comboTimer = 0;

let player, enemies, particles, sparks;

// ─────────────────────────────────────────────
//  SETUP & RESIZE
// ─────────────────────────────────────────────
function resize() {
  const maxH = window.innerHeight - 90;
  const maxW = window.innerWidth  - 16;
  const ratio = LW / LH;
  let ch = Math.min(LH, maxH);
  let cw = ch * ratio;
  if (cw > maxW) { cw = maxW; ch = cw / ratio; }
  canvas.style.width  = cw + 'px';
  canvas.style.height = ch + 'px';
  canvas.width  = LW;
  canvas.height = LH;
}
resize();
window.addEventListener('resize', resize);

// ─────────────────────────────────────────────
//  CORE FUNCTIONS
// ─────────────────────────────────────────────
const ROAD_L = 68, ROAD_R = 332, ROAD_W = ROAD_R - ROAD_L;
const LANES = 3, LANE_W = ROAD_W / LANES;
function laneX(l) { return ROAD_L + LANE_W * l + LANE_W / 2; }

const ENEMY_COLORS = [
  ['#ff2244','#ff6688'], ['#ff8800','#ffbb44'], ['#ddff00','#eeff88'],
  ['#aa00ff','#cc66ff'], ['#ff00aa','#ff66cc'], ['#00ddff','#88eeff']
];

function initPlayer() {
  player = {
    x: laneX(1), y: 490, w: 36, h: 60, lane: 1, tx: laneX(1),
    invincible: false, invTimer: 0, trail: []
  };
}

function resetGame() {
  STATE = 'PLAYING';
  isPaused = false;
  score = 0; lives = 5; gameSpeed = 4; frame = 0;
  spawnTimer = 0; spawnInt = 180; combo = 0;
  enemies = []; particles = []; sparks = [];
  initPlayer();
  document.getElementById('btn-start').innerText = 'START / STOP';
}

// ─────────────────────────────────────────────
//  INPUT HANDLERS
// ─────────────────────────────────────────────
// UI START BUTTON
document.getElementById('start-button').addEventListener('click', () => {
  document.getElementById('ui-layer').style.display = 'none';
  resetGame();
});

// BOTTOM START/STOP BUTTON
document.getElementById('btn-start').addEventListener('click', (e) => {
  if (STATE === 'PLAYING') {
    isPaused = !isPaused;
    e.target.innerText = isPaused ? 'RESUME' : 'START / STOP';
  } else {
    resetGame();
  }
});

function tryMove(dir) {
  if (isPaused) return;
  const nl = player.lane + dir;
  if (nl >= 0 && nl < LANES) { player.lane = nl; player.tx = laneX(nl); }
}

const keys = {};
document.addEventListener('keydown', e => {
  if (keys[e.key]) return;
  keys[e.key] = true;
  if (STATE === 'PLAYING' && !isPaused) {
    if (e.key === 'ArrowLeft') tryMove(-1);
    if (e.key === 'ArrowRight') tryMove(+1);
  } else if (STATE !== 'PLAYING') {
    resetGame();
    document.getElementById('ui-layer').style.display = 'none';
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

function bindBtn(id, dir) {
  const el = document.getElementById(id);
  const trigger = e => { e.preventDefault(); tryMove(dir); el.classList.add('held'); };
  const release = e => { e.preventDefault(); el.classList.remove('held'); };
  el.addEventListener('touchstart', trigger, {passive:false});
  el.addEventListener('touchend', release, {passive:false});
  el.addEventListener('mousedown', trigger);
  el.addEventListener('mouseup', release);
}
bindBtn('btn-left', -1);
bindBtn('btn-right', 1);

// ─────────────────────────────────────────────
//  UPDATE LOGIC
// ─────────────────────────────────────────────
function update() {
  if (STATE !== 'PLAYING' || isPaused) return;

  frame++;
  score += gameSpeed * 0.07;
  gameSpeed = Math.min(14, 4 + frame / 480);
  spawnInt = Math.max(75, 180 - frame / 36);
  roadOff = (roadOff + gameSpeed) % 70;

  player.x += (player.tx - player.x) * 0.16;
  player.trail.unshift({ x: player.x, y: player.y });
  if (player.trail.length > 12) player.trail.pop();

  if (player.invincible) {
    player.invTimer--;
    if (player.invTimer <= 0) player.invincible = false;
  }

  spawnTimer++;
  if (spawnTimer >= spawnInt) {
    const lane = Math.floor(Math.random() * LANES);
    const col = ENEMY_COLORS[Math.floor(Math.random() * ENEMY_COLORS.length)];
    enemies.push({ x: laneX(lane), y: -80, w: 34, h: 58, color: col[0], shine: col[1], spd: 0.7 + Math.random() * 0.5, passed: false });
    spawnTimer = 0;
  }

  for (const e of enemies) {
    e.y += e.spd + gameSpeed * 0.72;
    if (!player.invincible && Math.abs(player.x - e.x) < 25 && Math.abs(player.y - e.y) < 50) {
      lives--;
      player.invincible = true; player.invTimer = 140;
      if (lives <= 0) { STATE = 'GAMEOVER'; if (score > bestScore) bestScore = score; }
    }
  }
  enemies = enemies.filter(e => e.y < LH + 100);
}

// ─────────────────────────────────────────────
//  DRAWING
// ─────────────────────────────────────────────
function rr(x,y,w,h,r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.fill();
}

function draw() {
  ctx.fillStyle = '#06060f';
  ctx.fillRect(0,0,LW,LH);
  
  // Road
  ctx.fillStyle = '#141420';
  ctx.fillRect(ROAD_L, 0, ROAD_W, LH);
  
  // HUD
  ctx.fillStyle = 'rgba(0,0,12,0.8)';
  ctx.fillRect(0,0,LW,42);
  ctx.fillStyle = '#00ffc8';
  ctx.font = 'bold 16px Orbitron';
  ctx.textAlign = 'left';
  ctx.fillText(Math.floor(score).toString().padStart(7,'0'), 10, 28);
  
  // Lives (Heart icons)
  ctx.textAlign = 'right';
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = i < lives ? '#ff3364' : '#333344';
    ctx.fillText('♥', LW - 20 - i * 25, 28);
  }

  if (STATE === 'START') return;

  // Player
  if (!(player.invincible && Math.floor(frame/5)%2)) {
    ctx.fillStyle = '#00ccff';
    rr(player.x-18, player.y-30, 36, 60, 8);
  }

  // Enemies
  for (const e of enemies) {
    ctx.fillStyle = e.color;
    rr(e.x-17, e.y-29, 34, 58, 8);
  }

  if (STATE === 'GAMEOVER') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0,0,LW,LH);
    ctx.fillStyle = '#ff3364';
    ctx.textAlign = 'center';
    ctx.font = 'bold 40px Orbitron';
    ctx.fillText('GAME OVER', LW/2, LH/2);
    ctx.font = '16px Orbitron';
    ctx.fillText('PRESS START TO RETRY', LW/2, LH/2 + 50);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

initPlayer();
enemies = [];
loop();
</script>
</body>
</html>
