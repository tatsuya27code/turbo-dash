<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TURBO DASH</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  /* のCSSを完全維持 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #04040f; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; font-family: 'Share Tech Mono', monospace; }
  #game-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.8); z-index: 10; }
  #start-screen { text-align: center; color: #00ffc8; border: 2px solid #00ffc8; padding: 20px; background: #0a0a0f; box-shadow: 0 0 20px #00ffc8; }
  #start-button { background: #00ffc8; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-top: 20px; }
  #gameCanvas { display: block; border: 1px solid rgba(0,255,200,0.25); box-shadow: 0 0 15px rgba(0,255,200,0.15), 0 0 50px rgba(0,255,200,0.06), inset 0 0 30px rgba(0,0,0,0.5); image-rendering: pixelated; }
  #btn-row { display: flex; gap: 10px; width: 100%; }
  .btn { flex: 1; background: rgba(0,255,200,0.07); border: 1px solid rgba(0,255,200,0.3); color: #00ffc8; font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; padding: 14px 0; border-radius: 6px; cursor: pointer; user-select: none; touch-action: none; text-align: center; transition: background 0.1s; letter-spacing: 1px; }
  .btn:active { background: rgba(0,255,200,0.22); box-shadow: 0 0 12px rgba(0,255,200,0.3); }
  #btn-start { background: rgba(255,60,100,0.1); border-color: rgba(255,60,100,0.4); color: #ff3c64; font-size: 13px; letter-spacing: 2px; }
</style>
</head>
<body>

 <div id="ui-layer">
    <div id="start-screen">
        <h1>TURBO DASH</h1>
        <div class="instructions">
            <p>【操作方法】</p>
            <ul>
                <li>← → : 左右移動 / SPACE : ターボ</li>
            </ul>
            <p>【ミッション】</p>
            <p>不のデータを収集せよ。ライフは5つ。<br>赤いボタンで一時停止が可能です。</p>
        </div>
        <button id="start-button">START ENGINE</button>
    </div>
</div>

<div id="game-wrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="btn-row">
    <button class="btn" id="btn-left">◀</button>
    <button class="btn" id="btn-start">START / STOP</button>
    <button class="btn" id="btn-right">▶</button>
  </div>
</div>

<script>
// --- の全ロジックを完全保存 ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const LW = 400, LH = 600;

function resize() {
  const maxH = window.innerHeight - 90;
  const maxW = window.innerWidth - 16;
  const ratio = LW / LH;
  let ch = Math.min(LH, maxH);
  let cw = ch * ratio;
  if (cw > maxW) { cw = maxW; ch = cw / ratio; }
  canvas.width = LW; canvas.height = LH;
  canvas.style.width = cw + 'px'; canvas.style.height = ch + 'px';
}
resize(); window.addEventListener('resize', resize);

const ROAD_L = 68, ROAD_R = 332, ROAD_W = ROAD_R - ROAD_L, LANES = 3, LANE_W = ROAD_W / LANES;
function laneX(l) { return ROAD_L + LANE_W * l + LANE_W / 2; }
const ENEMY_COLORS = [['#ff2244','#ff6688'],['#ff8800','#ffbb44'],['#ddff00','#eeff88'],['#aa00ff','#cc66ff'],['#ff00aa','#ff66cc'],['#00ddff','#88eeff']];

let STATE = 'START';
let isPaused = false; // ★一時停止用
let score = 0, bestScore = 0, lives = 5; // ★ライフ5
let frame = 0, gameSpeed = 4, roadOff = 0, spawnTimer = 0, spawnInt = 180, combo = 0, comboTimer = 0;
let player, enemies, particles, sparks;

function initPlayer() {
  player = { x: laneX(1), y: 490, w: 36, h: 60, lane: 1, tx: laneX(1), invincible: false, invTimer: 0, trail: [] };
}

function resetGame() {
  STATE = 'PLAYING'; isPaused = false;
  score = 0; lives = 5; gameSpeed = 4; frame = 0; roadOff = 0; spawnTimer = 0; spawnInt = 180; combo = 0; comboTimer = 0;
  enemies = []; particles = []; sparks = [];
  initPlayer();
  document.getElementById('btn-start').innerText = 'START / STOP';
}

// ボタンイベント
document.getElementById('start-button').addEventListener('click', () => {
    document.getElementById('ui-layer').style.display = 'none';
    resetGame();
});

document.getElementById('btn-start').addEventListener('click', () => {
  if (STATE === 'PLAYING') {
    isPaused = !isPaused;
    document.getElementById('btn-start').innerText = isPaused ? 'RESUME' : 'START / STOP';
  } else {
    document.getElementById('ui-layer').style.display = 'none';
    resetGame();
  }
});

// 背景演出
const sideDecor = [];
for (let i = 0; i < 10; i++) { sideDecor.push({ side: 0, y: i * 90 - 40, phase: i * 0.4 }); sideDecor.push({ side: 1, y: i * 90 - 40, phase: i * 0.4 + 0.2 }); }
const sideDots = Array.from({length:60}, () => ({ x: Math.random() < 0.5 ? Math.random()*(ROAD_L-4) : ROAD_R+4+Math.random()*(LW-ROAD_R-4), y: Math.random()*LH, r: Math.random()*1.5+0.5, spd: Math.random()*0.4+0.2 }));

function update() {
  if (STATE !== 'PLAYING' || isPaused) return; // ★一時停止対応
  frame++;
  score += gameSpeed * 0.07;
  gameSpeed = Math.min(14, 4 + frame / 480);
  spawnInt = Math.max(75, 180 - frame / 36);
  roadOff = (roadOff + gameSpeed) % 70;

  for (const d of sideDecor) { d.y += gameSpeed * 0.9; if (d.y > LH + 40) d.y -= 900; }
  for (const d of sideDots) { d.y += d.spd + gameSpeed * 0.15; if (d.y > LH) d.y = 0; }

  player.x += (player.tx - player.x) * 0.16;
  player.trail.unshift({ x: player.x, y: player.y });
  if (player.trail.length > 12) player.trail.pop();

  if (player.invincible) { player.invTimer--; if (player.invTimer <= 0) player.invincible = false; }
  if (comboTimer > 0) comboTimer--; else combo = 0;

  spawnTimer++;
  if (spawnTimer >= spawnInt) {
    let lane = Math.floor(Math.random() * LANES);
    const col = ENEMY_COLORS[Math.floor(Math.random() * ENEMY_COLORS.length)];
    enemies.push({ x: laneX(lane), y: -80, w: 34, h: 58, lane, color: col[0], shine: col[1], spd: 0.7 + Math.random()*0.5, passed: false });
    spawnTimer = 0;
  }

  for (const e of enemies) {
    e.y += e.spd + gameSpeed * 0.72;
    if (!e.passed && e.y > player.y + player.h) { e.passed = true; combo++; comboTimer = 180; }
    if (!player.invincible && Math.abs(player.x - e.x) < 25 && Math.abs(player.y - e.y) < 50) {
      lives--; combo = 0; explode(player.x, player.y);
      player.invincible = true; player.invTimer = 140;
      if (lives <= 0) { STATE = 'GAMEOVER'; if (score > bestScore) bestScore = score; }
    }
  }
  enemies = enemies.filter(e => e.y < LH + 100);

  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vx *= 0.93; p.vy *= 0.93; p.vy += 0.15; p.life -= 0.022; }
  particles = particles.filter(p => p.life > 0);
  for (const s of sparks) { s.x += s.vx; s.y += s.vy; s.vx *= 0.88; s.life -= 0.035; }
  sparks = sparks.filter(s => s.life > 0);
}

// 描画ヘルパー
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();ctx.fill();}

function explode(x,y){ for(let i=0;i<30;i++){ const a=Math.random()*Math.PI*2,s=2+Math.random()*7; particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,size:3+Math.random()*5,hue:10+Math.random()*40});}}

// --- の豪華な描画システム ---
function drawRoad() {
  ctx.fillStyle = '#06060f'; ctx.fillRect(0, 0, LW, LH);
  for (const d of sideDots) { ctx.globalAlpha = 0.4; ctx.fillStyle = '#88aaff'; ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill(); }
  ctx.globalAlpha = 1;
  const roadGrad = ctx.createLinearGradient(ROAD_L, 0, ROAD_R, 0);
  roadGrad.addColorStop(0,'#101018'); roadGrad.addColorStop(0.5,'#141420'); roadGrad.addColorStop(1,'#101018');
  ctx.fillStyle = roadGrad; ctx.fillRect(ROAD_L, 0, ROAD_W, LH);

  for (let y = -60; y < LH + 60; y += 24) {
    const ty = y + (roadOff * 1.2) % 48;
    ctx.fillStyle = Math.floor(ty/24)%2===0 ? '#cc2200' : '#ffffff';
    ctx.fillRect(ROAD_L-8, ty, 8, 24); ctx.fillRect(ROAD_R, ty, 8, 24);
  }

  for (let l = 1; l < LANES; l++) {
    const x = ROAD_L + LANE_W * l;
    ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 2; ctx.setLineDash([42, 28]);
    ctx.lineDashOffset = -roadOff; ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, LH); ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawPlayer() {
  if (player.invincible && Math.floor(frame/5) % 2 === 1) return;
  const { x, y, w, h, trail } = player;
  trail.forEach((t, i) => { ctx.globalAlpha = (1-i/trail.length)*0.25; ctx.fillStyle = '#00aaff'; rr(t.x-w/2+6, t.y+h/2-4, w-12, 6, 3); });
  ctx.globalAlpha = 1;
  ctx.save(); ctx.shadowColor = '#00ccff'; ctx.shadowBlur = 22; ctx.fillStyle = '#00ccff'; rr(x-w/2, y-h/2, w, h, 8); ctx.restore();
  ctx.save(); ctx.translate(x, y);
  const bodyG = ctx.createLinearGradient(-w/2, 0, w/2, 0);
  bodyG.addColorStop(0, '#0066cc'); bodyG.addColorStop(0.5, '#00aaff'); bodyG.addColorStop(1, '#0066cc');
  ctx.fillStyle = bodyG; rr(-w/2, -h/2, w, h, 8);
  ctx.fillStyle = 'rgba(0,220,255,0.55)'; rr(-w/2+5, -h/2+8, w-10, 18, 3);
  ctx.restore();
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,12,0.78)'; ctx.fillRect(0, 0, LW, 42);
  ctx.fillStyle = '#00ffc8'; ctx.font = 'bold 16px Orbitron'; ctx.textAlign = 'left';
  ctx.fillText(Math.floor(score).toString().padStart(7,'0'), 10, 30);
  ctx.textAlign = 'right';
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = i < lives ? '#ff3364' : '#333344'; ctx.fillText('♥', LW - 20 - i * 25, 30);
  }
}

function draw() {
  ctx.clearRect(0, 0, LW, LH);
  drawRoad();
  if (STATE === 'START') { drawStartScreen(); return; }
  for (const e of enemies) {
    ctx.fillStyle = e.color; rr(e.x-17, e.y-29, 34, 58, 8);
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fillRect(e.x-12, e.y-24, 24, 12);
  }
  drawPlayer();
  for (const p of particles) { ctx.globalAlpha = p.life; ctx.fillStyle = `hsl(${p.hue},100%,50%)`; rr(p.x-p.size/2, p.y-p.size/2, p.size, p.size, 2); }
  ctx.globalAlpha = 1;
  drawHUD();
  if (STATE === 'GAMEOVER') { ctx.fillStyle = 'rgba(2,2,14,0.9)'; ctx.fillRect(0,0,LW,LH); ctx.fillStyle = '#ff3364'; ctx.font = 'bold 46px Orbitron'; ctx.textAlign='center'; ctx.fillText('GAME OVER', LW/2, LH/2); }
}

function drawStartScreen() {
  ctx.fillStyle = 'rgba(2,2,14,0.88)'; ctx.fillRect(0,0,LW,LH);
  ctx.shadowColor = '#00ffc8'; ctx.shadowBlur = 40; ctx.fillStyle = '#00ffc8';
  ctx.font = 'bold 52px Orbitron'; ctx.textAlign = 'center'; ctx.fillText('TURBO', LW/2, LH/2-80);
  ctx.shadowColor = '#ff3364'; ctx.fillStyle = '#ff3364'; ctx.fillText('DASH', LW/2, LH/2-26);
  ctx.shadowBlur = 0; ctx.fillStyle = '#ffaa00'; ctx.font = 'bold 14px Orbitron';
  ctx.fillText('PRESS START TO PLAY', LW/2, LH/2+100);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

document.getElementById('btn-left').onclick = () => { if(!isPaused) { player.lane = Math.max(0, player.lane-1); player.tx = laneX(player.lane); } };
document.getElementById('btn-right').onclick = () => { if(!isPaused) { player.lane = Math.min(2, player.lane+1); player.tx = laneX(player.lane); } };

initPlayer(); enemies = []; particles = []; sparks = []; loop();
</script>
</body>
</html>
