<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TURBO DASH</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #04040f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
  }

  #game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  /* 説明画面レイヤー（半透明で背後を透かす） */
  #ui-layer {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: center;
    background: rgba(0, 0, 0, 0.7);
    z-index: 100;
  }

  #start-screen {
    text-align: center;
    color: #00ffc8;
    border: 1px solid rgba(0, 255, 200, 0.5);
    padding: 30px;
    background: #0a0a15;
    box-shadow: 0 0 30px rgba(0, 255, 200, 0.2);
    border-radius: 8px;
    max-width: 320px;
  }

  #start-button {
    background: #00ffc8;
    color: #000;
    border: none;
    padding: 12px 30px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 16px;
    cursor: pointer;
    margin-top: 20px;
    border-radius: 4px;
    box-shadow: 0 0 15px rgba(0, 255, 200, 0.5);
  }

  #gameCanvas {
    display: block;
    border: 1px solid rgba(0,255,200,0.25);
    box-shadow: 0 0 20px rgba(0,255,200,0.1);
    image-rendering: pixelated;
  }

  #btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }

  .btn {
    flex: 1;
    background: rgba(0,255,200,0.07);
    border: 1px solid rgba(0,255,200,0.3);
    color: #00ffc8;
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    padding: 15px 0;
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
  }
  
  #btn-start {
    background: rgba(255,60,100,0.1);
    border-color: rgba(255,60,100,0.4);
    color: #ff3c64;
    font-size: 12px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div id="ui-layer">
    <div id="start-screen">
        <h1 style="margin-bottom:15px; font-size: 28px; font-family: 'Orbitron';">TURBO DASH</h1>
        <div style="text-align: left; font-size: 14px; line-height: 1.6;">
            <p style="color: #ffaa00; border-bottom: 1px solid #ffaa00; margin-bottom: 5px;">CONTROLS</p>
            <p>◀ ▶ : MOVE / SPACE : BOOST</p>
            <p style="color: #ffaa00; border-bottom: 1px solid #ffaa00; margin-top:15px; margin-bottom: 5px;">MISSION</p>
            <p>避けて生き残れ。ライフは5つ。<br>
               赤いボタンで一時停止が可能。</p>
        </div>
        <button id="start-button">START ENGINE</button>
    </div>
</div>

<div id="game-wrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="btn-row">
    <button class="btn" id="btn-left">◀</button>
    <button class="btn" id="btn-start">START / STOP</button>
    <button class="btn" id="btn-right">▶</button>
  </div>
</div>

<script>
// --- 元のビジュアル設定を復元したメインプログラム ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const LW = 400, LH = 600;

let STATE = 'START';
let isPaused = false;
let lives = 5;
let score = 0, bestScore = 0;
let frame = 0, gameSpeed = 4, roadOff = 0;
let player, enemies = [], particles = [];

function resize() {
  const maxH = window.innerHeight - 110;
  const ratio = LW / LH;
  let ch = Math.min(LH, maxH);
  canvas.width = LW; canvas.height = LH;
  canvas.style.width = (ch * ratio) + 'px';
  canvas.style.height = ch + 'px';
}
window.addEventListener('resize', resize);
resize();

function initPlayer() {
  player = { x: LW/2, y: 500, w: 36, h: 60, tx: LW/2, inv: false, invT: 0 };
}

function resetGame() {
  STATE = 'PLAYING'; isPaused = false;
  score = 0; lives = 5; gameSpeed = 4; frame = 0;
  enemies = []; particles = [];
  initPlayer();
  document.getElementById('btn-start').innerText = 'START / STOP';
}

// ボタン連携
document.getElementById('start-button').addEventListener('click', () => {
  document.getElementById('ui-layer').style.display = 'none';
  resetGame();
});

document.getElementById('btn-start').addEventListener('click', (e) => {
  if (STATE === 'PLAYING') {
    isPaused = !isPaused;
    e.target.innerText = isPaused ? 'RESUME' : 'START / STOP';
  } else {
    document.getElementById('ui-layer').style.display = 'none';
    resetGame();
  }
});

function update() {
  if (STATE !== 'PLAYING' || isPaused) return;

  frame++;
  score += 0.1;
  roadOff = (roadOff + gameSpeed) % 60;
  player.x += (player.tx - player.x) * 0.15;

  if (frame % 100 === 0) {
    enemies.push({ x: 85 + Math.floor(Math.random()*3)*115, y: -100, spd: gameSpeed + 1 });
  }

  enemies.forEach(e => {
    e.y += e.spd;
    if (!player.inv && Math.abs(player.x - e.x) < 30 && Math.abs(player.y - e.y) < 50) {
      lives--; player.inv = true; player.invT = 100;
      if (lives <= 0) STATE = 'GAMEOVER';
    }
  });
  if (player.inv) { player.invT--; if (player.invT <= 0) player.inv = false; }
  enemies = enemies.filter(e => e.y < LH + 100);
}

function drawRoad() {
  ctx.fillStyle = '#0a0a18';
  ctx.fillRect(0, 0, LW, LH);
  ctx.fillStyle = '#141425';
  ctx.fillRect(60, 0, 280, LH);
  // 白線
  ctx.strokeStyle = 'rgba(0, 255, 200, 0.2)';
  ctx.setLineDash([20, 40]);
  ctx.lineDashOffset = -roadOff;
  ctx.beginPath();
  ctx.moveTo(153, 0); ctx.lineTo(153, LH);
  ctx.moveTo(247, 0); ctx.lineTo(247, LH);
  ctx.stroke();
  ctx.setLineDash([]);
}

function draw() {
  drawRoad();

  // HUD
  ctx.fillStyle = '#00ffc8';
  ctx.font = '16px Orbitron'; ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + Math.floor(score), 20, 35);
  
  ctx.textAlign = 'right';
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = i < lives ? '#ff3364' : '#2a2a35';
    ctx.fillText('♥', LW - 20 - i * 25, 35);
  }

  if (STATE === 'PLAYING') {
    // Player (ネオンブルー)
    if (!(player.inv && Math.floor(frame/5)%2)) {
      ctx.shadowBlur = 15; ctx.shadowColor = '#00ccff';
      ctx.fillStyle = '#00ccff';
      ctx.fillRect(player.x-18, player.y-30, 36, 60);
      ctx.shadowBlur = 0;
    }
    // Enemies (ネオンオレンジ)
    enemies.forEach(e => {
      ctx.shadowBlur = 10; ctx.shadowColor = '#ff8800';
      ctx.fillStyle = '#ff8800';
      ctx.fillRect(e.x-17, e.y-29, 34, 58);
      ctx.shadowBlur = 0;
    });
  } else if (STATE === 'GAMEOVER') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0,0,LW,LH);
    ctx.fillStyle = '#ff3364'; ctx.textAlign = 'center';
    ctx.font = 'bold 32px Orbitron';
    ctx.fillText('GAME OVER', LW/2, LH/2);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// 左右移動ボタン
document.getElementById('btn-left').onclick = () => { player.tx = Math.max(90, player.tx - 115); };
document.getElementById('btn-right').onclick = () => { player.tx = Math.min(310, player.tx + 115); };

initPlayer();
loop();
</script>
</body>
</html>
