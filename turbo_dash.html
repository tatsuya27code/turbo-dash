<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TURBO DASH</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  /* のCSSを100%継承 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #04040f; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; font-family: 'Share Tech Mono', monospace; }
  #game-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.8); z-index: 10; }
  #start-screen { text-align: center; color: #00ffc8; border: 2px solid #00ffc8; padding: 20px; background: #0a0a0f; box-shadow: 0 0 20px #00ffc8; }
  #start-button { background: #00ffc8; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-top: 20px; }
  #gameCanvas { display: block; border: 1px solid rgba(0,255,200,0.25); box-shadow: 0 0 15px rgba(0,255,200,0.15), 0 0 50px rgba(0,255,200,0.06), inset 0 0 30px rgba(0,0,0,0.5); image-rendering: pixelated; }
  #btn-row { display: flex; gap: 10px; width: 100%; }
  .btn { flex: 1; background: rgba(0,255,200,0.07); border: 1px solid rgba(0,255,200,0.3); color: #00ffc8; font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; padding: 14px 0; border-radius: 6px; cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: none; text-align: center; transition: background 0.1s; letter-spacing: 1px; }
  .btn:active, .btn.held { background: rgba(0,255,200,0.22); box-shadow: 0 0 12px rgba(0,255,200,0.3); }
  #btn-start { background: rgba(255,60,100,0.1); border-color: rgba(255,60,100,0.4); color: #ff3c64; font-size: 13px; letter-spacing: 2px; }
  #btn-start:active { background: rgba(255,60,100,0.25); }
</style>
</head>
<body>

 <div id="ui-layer">
    <div id="start-screen">
        <h1>TURBO DASH</h1>
        <div class="instructions">
            <p>【操作方法】</p>
            <ul>
                <li>← → : 左右移動</li>
                <li>SPACE : ターボ (回数制限)</li>
            </ul>
            <p>【ミッション】</p>
            <p>不のデータを収集せよ。ライフは5つ。<br>赤いボタンで一時停止が可能です。</p>
        </div>
        <button id="start-button">START ENGINE</button>
    </div>
</div>

<div id="game-wrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="btn-row">
    <button class="btn" id="btn-left">◀</button>
    <button class="btn" id="btn-start">START / STOP</button>
    <button class="btn" id="btn-right">▶</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  CANVAS & GAME SETUP (保持)
// ─────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const LW = 400; const LH = 600;

function resize() {
  const maxH = window.innerHeight - 90; const maxW = window.innerWidth - 16; const ratio = LW / LH;
  let ch = Math.min(LH, maxH); let cw = ch * ratio;
  if (cw > maxW) { cw = maxW; ch = cw / ratio; }
  canvas.style.width = cw + 'px'; canvas.style.height = ch + 'px'; canvas.width = LW; canvas.height = LH;
}
resize(); window.addEventListener('resize', resize);

const ROAD_L = 68; const ROAD_R = 332; const ROAD_W = ROAD_R - ROAD_L; const LANES = 3; const LANE_W = ROAD_W / LANES;
function laneX(l) { return ROAD_L + LANE_W * l + LANE_W / 2; }
const ENEMY_COLORS = [['#ff2244','#ff6688'],['#ff8800','#ffbb44'],['#ddff00','#eeff88'],['#aa00ff','#cc66ff'],['#ff00aa','#ff66cc'],['#00ddff','#88eeff']];

let STATE = 'START';
let isPaused = false; // ★追加
let score = 0; let bestScore = 0; let lives = 5; // ★ライフ5に変更
let gameSpeed = 4; let frame = 0; let roadOff = 0; let spawnTimer = 0; let spawnInt = 180; let combo = 0; let comboTimer = 0;
let player, enemies, particles, sparks;

function initPlayer() {
  player = { x: laneX(1), y: 490, w: 36, h: 60, lane: 1, tx: laneX(1), invincible: false, invTimer: 0, trail: [] };
}

function resetGame() {
  STATE = 'PLAYING'; isPaused = false; // ★追加
  score = 0; lives = 5; gameSpeed = 4; frame = 0; roadOff = 0; spawnTimer = 0; spawnInt = 180; combo = 0; comboTimer = 0;
  enemies = []; particles = []; sparks = [];
  initPlayer();
  document.getElementById('btn-start').innerText = 'START / STOP';
}

// ─────────────────────────────────────────────
//  INPUT (保持)
// ─────────────────────────────────────────────
const keys = {};
let leftHeld = false, rightHeld = false, moveCd = 0;

document.getElementById('start-button').addEventListener('click', () => {
    document.getElementById('ui-layer').style.display = 'none';
    resetGame();
});

function tryMove(dir) {
  const nl = player.lane + dir;
  if (nl >= 0 && nl < LANES) { player.lane = nl; player.tx = laneX(nl); }
}

function bindBtn(id, onDown, onUp) {
  const el = document.getElementById(id);
  const down = e => { e.preventDefault(); onDown(); el.classList.add('held'); };
  const up   = e => { e.preventDefault(); if(onUp) onUp(); el.classList.remove('held'); };
  el.addEventListener('touchstart', down, {passive:false});
  el.addEventListener('touchend', up, {passive:false});
  el.addEventListener('mousedown', down);
  el.addEventListener('mouseup', up);
}

bindBtn('btn-left', () => { if(!isPaused) { leftHeld = true; tryMove(-1); moveCd = 22; } }, () => { leftHeld = false; });
bindBtn('btn-right', () => { if(!isPaused) { rightHeld = true; tryMove(+1); moveCd = 22; } }, () => { rightHeld = false; });

// START/STOP ボタンに一時停止機能を統合
document.getElementById('btn-start').addEventListener('click', () => {
  if (STATE === 'PLAYING') {
    isPaused = !isPaused;
    document.getElementById('btn-start').innerText = isPaused ? 'RESUME' : 'START / STOP';
  } else {
    document.getElementById('ui-layer').style.display = 'none';
    resetGame();
  }
});

// ─────────────────────────────────────────────
//  DECOR & LOGIC (保持)
// ─────────────────────────────────────────────
const sideDecor = [];
for (let i = 0; i < 10; i++) { sideDecor.push({ side: 0, y: i * 90 - 40, phase: i * 0.4 }); sideDecor.push({ side: 1, y: i * 90 - 40, phase: i * 0.4 + 0.2 }); }
const sideDots = Array.from({length:60}, () => ({ x: Math.random() < 0.5 ? ROAD_L - 4 - Math.random() * (ROAD_L - 4) : ROAD_R + 4 + Math.random() * (LW - ROAD_R - 4), y: Math.random() * LH, r: Math.random() * 1.5 + 0.5, spd: Math.random() * 0.4 + 0.2 }));

function explode(x, y) { for (let i = 0; i < 30; i++) { const a = Math.random() * Math.PI * 2, s = 2 + Math.random() * 7; particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 1, size: 3 + Math.random() * 5, hue: 10 + Math.random() * 40 }); } }
function addSparks(x, y) { for (let i = 0; i < 12; i++) { const a = Math.PI/2 + (Math.random()-0.5) * Math.PI; sparks.push({ x, y, vx: Math.cos(a) * (1+Math.random()*3), vy: Math.sin(a) * (1+Math.random()*3), life: 1 }); } }
function hits(a, b) { return (Math.abs(a.x - b.x) < (a.w + b.w)/2 - 7 && Math.abs(a.y - b.y) < (a.h + b.h)/2 - 7); }

// ─────────────────────────────────────────────
//  UPDATE (保持 + 一時停止追加)
// ─────────────────────────────────────────────
function update() {
  if (STATE !== 'PLAYING' || isPaused) return; // ★一時停止対応

  frame++; score += gameSpeed * 0.07; gameSpeed = Math.min(14, 4 + frame / 480); spawnInt = Math.max(75, 180 - frame / 36);
  roadOff = (roadOff + gameSpeed) % 70;

  for (const d of sideDecor) { d.y += gameSpeed * 0.9; if (d.y > LH + 40) d.y -= 900; }
  for (const d of sideDots) { d.y += d.spd + gameSpeed * 0.15; if (d.y > LH) d.y = 0; }

  moveCd--; if (moveCd <= 0) { if (leftHeld) { tryMove(-1); moveCd = 20; } if (rightHeld) { tryMove(+1); moveCd = 20; } }
  player.x += (player.tx - player.x) * 0.16;
  player.trail.unshift({ x: player.x, y: player.y }); if (player.trail.length > 12) player.trail.pop();

  if (player.invincible) { player.invTimer--; if (player.invTimer <= 0) player.invincible = false; }
  if (comboTimer > 0) comboTimer--; else combo = 0;

  spawnTimer++;
  if (spawnTimer >= spawnInt) {
    let lane = Math.floor(Math.random() * LANES);
    const col = ENEMY_COLORS[Math.floor(Math.random() * ENEMY_COLORS.length)];
    enemies.push({ x: laneX(lane), y: -80, w: 34, h: 58, lane, color: col[0], shine: col[1], spd: 0.7 + Math.random() * 0.5, passed: false });
    spawnTimer = 0;
  }

  for (const e of enemies) {
    e.y += e.spd + gameSpeed * 0.72;
    if (!e.passed && e.y > player.y + player.h) { e.passed = true; combo++; comboTimer = 180; }
    if (!player.invincible && hits(player, e)) {
      lives--; combo = 0; explode(player.x, player.y); addSparks(player.x, player.y - 20);
      player.invincible = true; player.invTimer = 140;
      if (lives <= 0) { STATE = 'GAMEOVER'; if (score > bestScore) bestScore = score; }
    }
  }
  enemies = enemies.filter(e => e.y < LH + 100);

  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vx *= 0.93; p.vy *= 0.93; p.vy += 0.15; p.life -= 0.022; }
  particles = particles.filter(p => p.life > 0);
  for (const s of sparks) { s.x += s.vx; s.y += s.vy; s.vx *= 0.88; s.life -= 0.035; }
  sparks = sparks.filter
