<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TURBO DASH</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  /* のスタイルを完全継承 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #04040f; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; font-family: 'Share Tech Mono', monospace; }
  #game-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  #gameCanvas { display: block; border: 1px solid rgba(0,255,200,0.25); box-shadow: 0 0 15px rgba(0,255,200,0.15), 0 0 50px rgba(0,255,200,0.06); image-rendering: pixelated; }
  #btn-row { display: flex; gap: 10px; width: 100%; }
  .btn { flex: 1; background: rgba(0,255,200,0.07); border: 1px solid rgba(0,255,200,0.3); color: #00ffc8; font-family: 'Orbitron'; font-size: 20px; font-weight: 700; padding: 14px 0; border-radius: 6px; cursor: pointer; user-select: none; touch-action: none; text-align: center; }
  #btn-start { background: rgba(255,60,100,0.1); border-color: rgba(255,60,100,0.4); color: #ff3c64; font-size: 13px; letter-spacing: 2px; }
</style>
</head>
<body>

<div id="game-wrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="btn-row">
    <button class="btn" id="btn-left">◀</button>
    <button class="btn" id="btn-start">START / STOP</button>
    <button class="btn" id="btn-right">▶</button>
  </div>
</div>

<script>
// --- の全描画ロジックを1文字も変えずに流用 ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const LW = 400, LH = 600;

let STATE = 'START';
let isPaused = false; // ★一時停止フラグ
let score = 0, bestScore = 0, lives = 5; // ★ライフ5
let frame = 0, gameSpeed = 4, roadOff = 0;
let player, enemies = [], particles = [], sparks = [];

function resize() {
  const maxH = window.innerHeight - 100;
  const ratio = LW / LH;
  let ch = Math.min(LH, maxH);
  canvas.width = LW; canvas.height = LH;
  canvas.style.width = (ch * ratio) + 'px';
  canvas.style.height = ch + 'px';
}
window.addEventListener('resize', resize); resize();

// 描画補助
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.fill();}

function initPlayer() {
  player = { x: LW/2, y: 490, w: 36, h: 60, tx: LW/2, inv: false, invT: 0, trail: [] };
}

function resetGame() {
  STATE = 'PLAYING'; isPaused = false;
  score = 0; lives = 5; gameSpeed = 4; frame = 0;
  enemies = []; particles = []; sparks = [];
  initPlayer();
  document.getElementById('btn-start').innerText = 'START / STOP';
}

// ボタン操作
document.getElementById('btn-start').onclick = (e) => {
  if (STATE === 'PLAYING') {
    isPaused = !isPaused;
    e.target.innerText = isPaused ? 'RESUME' : 'START / STOP';
  } else {
    resetGame();
  }
};

function update() {
  if (STATE !== 'PLAYING' || isPaused) return; // ★一時停止
  frame++;
  score += 0.1;
  gameSpeed = Math.min(14, 4 + frame / 800);
  roadOff = (roadOff + gameSpeed) % 60;
  player.x += (player.tx - player.x) * 0.16;
  if (frame % 80 === 0) {
    const lx = 85 + Math.floor(Math.random()*3)*115;
    enemies.push({ x: lx, y: -100, spd: gameSpeed + 1, col: '#ff3c64' });
  }
  enemies.forEach(e => {
    e.y += e.spd;
    if (!player.inv && Math.abs(player.x - e.x) < 30 && Math.abs(player.y - e.y) < 50) {
      lives--; player.inv = true; player.invT = 120;
      if (lives <= 0) { STATE = 'GAMEOVER'; if(score > bestScore) bestScore = score; }
    }
  });
  if (player.inv) { player.invT--; if (player.invT <= 0) player.inv = false; }
  enemies = enemies.filter(e => e.y < LH + 100);
}

// --- ビジュアル描画：元のコードの豪華版を再現 ---
function draw() {
  ctx.fillStyle = '#06060f'; ctx.fillRect(0,0,LW,LH); // 背景
  ctx.fillStyle = '#101018'; ctx.fillRect(68,0,264,LH); // 道路

  // ネオンライン
  ctx.strokeStyle = 'rgba(0, 255, 200, 0.2)'; ctx.setLineDash([20, 40]);
  ctx.lineDashOffset = -roadOff;
  ctx.beginPath(); ctx.moveTo(156,0); ctx.lineTo(156,LH); ctx.moveTo(244,0); ctx.lineTo(244,LH); ctx.stroke();
  ctx.setLineDash([]);

  if (STATE === 'START') {
    // ★HTMLを使わず、Canvasで元のタイトルを描画
    ctx.fillStyle = 'rgba(2,2,14,0.8)'; ctx.fillRect(0,0,LW,LH);
    ctx.shadowColor = '#00ffc8'; ctx.shadowBlur = 30; ctx.fillStyle = '#00ffc8';
    ctx.font = 'bold 50px Orbitron'; ctx.textAlign = 'center'; ctx.fillText('TURBO', LW/2, LH/2-40);
    ctx.shadowColor = '#ff3364'; ctx.fillStyle = '#ff3364'; ctx.fillText('DASH', LW/2, LH/2+20);
    ctx.shadowBlur = 0; ctx.font = '14px Orbitron'; ctx.fillStyle = '#ffaa00';
    ctx.fillText('PRESS START TO PLAY', LW/2, LH/2+80);
    return;
  }

  // HUD
  ctx.fillStyle = '#00ffc8'; ctx.font = 'bold 16px Orbitron'; ctx.textAlign = 'left';
  ctx.fillText(Math.floor(score).toString().padStart(7,'0'), 20, 30);
  ctx.textAlign = 'right';
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = i < lives ? '#ff3364' : '#333344';
    ctx.fillText('♥', LW - 20 - i * 25, 30);
  }

  // Cars
  if (STATE === 'PLAYING' || STATE === 'GAMEOVER') {
    enemies.forEach(e => {
      ctx.shadowBlur = 15; ctx.shadowColor = e.col;
      ctx.fillStyle = e.col; rr(e.x-17, e.y-29, 34, 58, 8);
      ctx.shadowBlur = 0;
    });
    if (!(player.inv && Math.floor(frame/5)%2)) {
      ctx.shadowBlur = 20; ctx.shadowColor = '#00ccff';
      ctx.fillStyle = '#00ccff'; rr(player.x-18, player.y-30, 36, 60, 8);
      ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fillRect(player.x-12, player.y-25, 24, 15);
      ctx.shadowBlur = 0;
    }
  }

  if (STATE === 'GAMEOVER') {
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,LW,LH);
    ctx.fillStyle = '#ff3364'; ctx.font = 'bold 40px Orbitron'; ctx.fillText('GAME OVER', LW/2, LH/2);
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
document.getElementById('btn-left').onclick = () => { if(!isPaused) player.tx = Math.max(100, player.tx-115); };
document.getElementById('btn-right').onclick = () => { if(!isPaused) player.tx = Math.min(300, player.tx+115); };
initPlayer(); loop();
</script>
</body>
</html>
