<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TURBO DASH</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #04040f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
  }

  #game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  /* 説明画面のレイヤー */
  #ui-layer {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: center;
    background: rgba(0, 0, 0, 0.7); 
    z-index: 100;
  }

  #start-screen {
    text-align: center;
    color: #00ffc8;
    border: 2px solid #00ffc8;
    padding: 25px;
    background: #0a0a15;
    box-shadow: 0 0 25px rgba(0, 255, 200, 0.4);
    border-radius: 12px;
    max-width: 320px;
  }

  #start-button {
    background: #00ffc8;
    color: #000;
    border: none;
    padding: 12px 25px;
    font-family: 'Orbitron', sans-serif;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    margin-top: 15px;
    border-radius: 4px;
  }

  #gameCanvas {
    display: block;
    border: 1px solid rgba(0,255,200,0.25);
    box-shadow: 0 0 15px rgba(0,255,200,0.15);
    image-rendering: pixelated;
  }

  #btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }

  .btn {
    flex: 1;
    background: rgba(0,255,200,0.07);
    border: 1px solid rgba(0,255,200,0.3);
    color: #00ffc8;
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    padding: 14px 0;
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
  }
  
  #btn-start {
    background: rgba(255,60,100,0.1);
    border-color: rgba(255,60,100,0.4);
    color: #ff3c64;
    font-size: 13px;
  }
</style>
</head>
<body>

<div id="ui-layer">
    <div id="start-screen">
        <h1 style="margin-bottom:10px;">TURBO DASH</h1>
        <div style="text-align: left; font-size: 14px; line-height: 1.5;">
            <p style="color: #ffaa00;">【操作】</p>
            <p>◀ ▶ : 左右移動 / SPACE : 加速</p>
            <p style="color: #ffaa00; margin-top:10px;">【ミッション】</p>
            <p>敵を避けろ！ライフは5つ。<br>
               下の赤いボタンで一時停止。</p>
        </div>
        <button id="start-button">START ENGINE</button>
    </div>
</div>

<div id="game-wrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="btn-row">
    <button class="btn" id="btn-left">◀</button>
    <button class="btn" id="btn-start">START / STOP</button>
    <button class="btn" id="btn-right">▶</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const LW = 400; 
const LH = 600; 

let STATE = 'START'; 
let isPaused = false;
let score = 0;
let bestScore = 0;
let lives = 5;
let gameSpeed = 4;
let frame = 0;
let enemies = [];
let player;

function resize() {
  const maxH = window.innerHeight - 100;
  const ratio = LW / LH;
  let ch = Math.min(LH, maxH);
  canvas.width = LW;
  canvas.height = LH;
  canvas.style.width = (ch * ratio) + 'px';
  canvas.style.height = ch + 'px';
}
window.addEventListener('resize', resize);
resize();

function initPlayer() {
  player = { x: LW/2, y: 500, w: 36, h: 60, tx: LW/2, inv: false, invT: 0 };
}

function resetGame() {
  STATE = 'PLAYING';
  isPaused = false;
  score = 0;
  lives = 5;
  gameSpeed = 4;
  enemies = [];
  initPlayer();
  document.getElementById('btn-start').innerText = 'START / STOP';
}

// ボタン操作の修正
document.getElementById('start-button').addEventListener('click', () => {
  document.getElementById('ui-layer').style.display = 'none';
  resetGame();
});

document.getElementById('btn-start').addEventListener('click', (e) => {
  if (STATE === 'PLAYING') {
    isPaused = !isPaused;
    e.target.innerText = isPaused ? 'RESUME' : 'START / STOP';
  } else {
    document.getElementById('ui-layer').style.display = 'none';
    resetGame();
  }
});

function move(dir) {
  if (STATE !== 'PLAYING' || isPaused) return;
  player.tx = Math.max(80, Math.min(320, player.tx + dir * 85));
}
document.getElementById('btn-left').onclick = () => move(-1);
document.getElementById('btn-right').onclick = () => move(1);

function update() {
  if (STATE !== 'PLAYING' || isPaused) return;

  frame++;
  score += 0.1;
  player.x += (player.tx - player.x) * 0.2;

  if (frame % 100 === 0) {
    enemies.push({ x: 85 + Math.floor(Math.random()*3)*85, y: -100, speed: gameSpeed + Math.random()*2 });
  }

  enemies.forEach((e, i) => {
    e.y += e.speed;
    if (!player.inv && Math.abs(player.x - e.x) < 30 && Math.abs(player.y - e.y) < 50) {
      lives--;
      player.inv = true; player.invT = 100;
      if (lives <= 0) STATE = 'GAMEOVER';
    }
  });
  if (player.inv) { player.invT--; if (player.invT <= 0) player.inv = false; }
  enemies = enemies.filter(e => e.y < LH);
}

function draw() {
  ctx.fillStyle = '#06060f';
  ctx.fillRect(0, 0, LW, LH);
  
  // 道
  ctx.fillStyle = '#141420';
  ctx.fillRect(70, 0, 260, LH);

  // HUD
  ctx.fillStyle = '#00ffc8';
  ctx.font = '18px Orbitron';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + Math.floor(score), 15, 30);
  
  // ライフ表示（右上に並べる）
  ctx.textAlign = 'right';
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = i < lives ? '#ff3364' : '#333344';
    ctx.fillText('♥', LW - 20 - i * 25, 30);
  }

  if (STATE === 'PLAYING') {
    if (!(player.inv && Math.floor(frame/5)%2)) {
      ctx.fillStyle = '#00ccff';
      ctx.fillRect(player.x-18, player.y-30, 36, 60);
    }
    enemies.forEach(e => {
      ctx.fillStyle = '#ff8800';
      ctx.fillRect(e.x-17, e.y-29, 34, 58);
    });
  } else if (STATE === 'GAMEOVER') {
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', LW/2, LH/2);
    ctx.fillText('PRESS START TO RETRY', LW/2, LH/2 + 40);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
